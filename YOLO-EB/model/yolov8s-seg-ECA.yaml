# YOLOv8s-seg 改进版 (轻量化 + 注意力, 方案 B)
task: segment
nc: 2  # smoke + fire
depth_multiple: 0.33
width_multiple: 0.50

# ===== Backbone =====
backbone:
  - [-1, 1, Conv, [64, 3, 2]]        # 0-P1/2
  - [-1, 1, Conv, [128, 3, 2]]       # 1-P2/4
  - [-1, 3, C2fGhost_ECA, [128]]     # 2 P2/4 改为轻量C2f + ECA
  - [-1, 1, Conv, [256, 3, 2]]       # 3-P3/8
  - [-1, 6, C2fGhost_ECA, [256]]     # 4 P3/8 轻量化
  - [-1, 1, Conv, [512, 3, 2]]       # 5-P4/16
  - [-1, 6, C2f, [512, True]]        # 6 P4/16 保留原生C2f
  - [-1, 1, Conv, [1024, 3, 2]]      # 7-P5/32
  - [-1, 3, C2f, [1024, True]]       # 8 P5/32
  - [-1, 1, SPPF, [1024, 5]]         # 9

# ===== Head =====
head:
  # 上采样 + 融合 P4
  - [-1, 1, nn.Upsample, [None, 2, 'nearest']]   # 10
  - [[-1, 6], 1, Concat, [1]]                    # 11
  - [-1, 3, C2fGhost_ECA, [512]]                 # 12 融合后轻量化
  - [-1, 1, CoordAttention, [512]]               # 13 CA 位置信息增强

  # 上采样 + 融合 P3
  - [-1, 1, nn.Upsample, [None, 2, 'nearest']]   # 14
  - [[-1, 4], 1, Concat, [1]]                    # 15
  - [-1, 3, C2fGhost_ECA, [256]]                 # 16 P3/8 小特征轻量化
  - [-1, 1, SimAM, [256]]                        # 17 P3 输出注意力

  # 下采样 P3→P4 + 融合
  - [-1, 1, DWConv, [256, 3, 2]]                 # 18 下采样
  - [[-1, 13], 1, Concat, [1]]                   # 19 concat 上面 CA 后的 P4
  - [-1, 3, C2fGhost_ECA, [512]]                 # 20 P4/16 中等特征
  - [-1, 1, SimAM, [512]]                        # 21 P4 输出注意力

  # 下采样 P4→P5 + 融合
  - [-1, 1, DWConv, [512, 3, 2]]                 # 22 下采样
  - [[-1, 9], 1, Concat, [1]]                    # 23 concat P5
  - [-1, 3, C2fGhost_ECA, [1024]]                # 24 P5/32 大特征
  - [-1, 1, SimAM, [1024]]                       # 25 P5 输出注意力

  # Segment head 输入 P3, P4, P5
  - [[17, 21, 25], 1, Segment, [nc, 32, 256]]

