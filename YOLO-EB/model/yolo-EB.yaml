# =========================================================
# YOLOv8-Seg + C2f_ECA + BiFPN
# =========================================================

nc: 2                      # 类别数
depth_multiple: 0.33
width_multiple: 0.25

# =========================================================
# (a) Backbone  —— 对应你图中的 Backbone
# =========================================================
backbone:
  - [-1, 1, Conv, [64, 3, 2]]          # (1) CBS
  - [-1, 1, Conv, [128, 3, 2]]         # (2) CBS
  - [-1, 3, C2f_ECA, [128, True]]      # (3) C2f_ECA

  - [-1, 1, Conv, [256, 3, 2]]         # (4) CBS → P3/8
  - [-1, 6, C2f_ECA, [256, True]]      # (5) C2f_ECA

  - [-1, 1, Conv, [512, 3, 2]]         # (6) CBS → P4/16
  - [-1, 6, C2f_ECA, [512, True]]      # (7) C2f_ECA

  - [-1, 1, Conv, [1024, 3, 2]]        # (8) CBS → P5/32
  - [-1, 3, C2f_ECA, [1024, True]]     # (9) C2f_ECA

  - [-1, 1, SPPF, [1024, 5]]           # (10) SPPF

# =========================================================
# (b) Neck + (c) Head —— 对应你图中的 BiFPN 结构
# =========================================================
head:
  # -------------------------------------------------------
  # P5 → P4（图中 11–14）
  # -------------------------------------------------------
  - [-1, 1, nn.Upsample, [None, 2, 'nearest']]   # (11) Upsample
  - [-1, 1, Conv, [256, 1, 1]]                   # 通道对齐（隐含）
  - [6, 1, Conv, [256, 1, 1]]                    # Backbone P4 对齐
  - [[-2, -1], 1, Concat, [1]]                   # (13) Concat
  - [-1, 1, BiFPNBlock, [256]]                   # (12) BiFPN
  - [-1, 3, C2f, [256]]                          # (14) C2f

  # -------------------------------------------------------
  # P4 → P3（图中 15–18，第一个分支）
  # -------------------------------------------------------
  - [-1, 1, nn.Upsample, [None, 2, 'nearest']]   # (15) Upsample
  - [-1, 1, Conv, [128, 1, 1]]                   # 通道对齐
  - [4, 1, Conv, [128, 1, 1]]                    # Backbone P3 对齐
  - [[-2, -1], 1, Concat, [1]]                   # (17) Concat
  - [-1, 1, BiFPNBlock, [128]]                   # (16) BiFPN
  - [-1, 3, C2f, [128]]                          # (18) C2f → P3

  # -------------------------------------------------------
  # Bottom-up：P3 → P4（图中 22–19，第二个分支）
  # -------------------------------------------------------
  - [-1, 1, Conv, [256, 3, 2]]                   # (22) Downsample
  - [[-1, 14], 1, Concat, [1]]                   # (20) Concat
  - [-1, 1, BiFPNBlock, [256]]                   # (21) BiFPN
  - [-1, 3, C2f, [256]]                          # (19) C2f → P4

  # -------------------------------------------------------
  # Bottom-up：P4 → P5（图中 23–26，第三个分支）
  # -------------------------------------------------------
  - [-1, 1, Conv, [512, 3, 2]]                   # (23) Downsample
  - [[-1, 9], 1, Concat, [1]]                    # (25) Concat
  - [-1, 1, BiFPNBlock, [512]]                   # (24) BiFPN
  - [-1, 3, C2f, [512]]                          # (26) C2f → P5

  # -------------------------------------------------------
  # Segment Head（右侧分割头）
  # -------------------------------------------------------
  - [[18, 22, 26], 1, Segment, [nc, 32, 256]]    # Seg Head
