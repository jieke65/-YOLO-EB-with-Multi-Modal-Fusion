  - [-1, 3, C2fGhost_EMALite, [256,2]]
  - [-1, 1, GCSA, [256]]

  # 下采样 P3→P4 + 融合
  - [-1, 1, DWConv, [256, 3, 2]]
  - [[-1, 13], 1, Concat, [1]]
  - [-1, 3, C2fGhost_EMALite, [512,2]]
  - [-1, 1, GCSA, [512]]

  # 下采样 P4→P5 + 融合
  - [-1, 1, DWConv, [512, 3, 2]]
  - [[-1, 9], 1, Concat, [1]]
  - [-1, 3, C2fGhost_EMALite, [1024,2]]
  - [-1, 1, GCSA, [1024]]

  # Segment head 输入 P3, P4, P5
  - [[17, 21, 25], 1, Segment, [nc, 32, 256]]
